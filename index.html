<html>
  <head>
    <title>Video</title>
	<script>
	  let player=null, c=null, g=null, g2=null;
	  function start(){
	   player=document.getElementById("v1");
	   c=document.getElementById("c1")
	   g=c.getContext("2d");
	   g2=document.getElementById("c2").getContext("2d");
	   span1=document.getElementById("s1");
	   navigator.mediaDevices.getUserMedia({video:true}).then((stream) => {
         player.srcObject = stream;
       });
	   setInterval(capture, 1000);
	  }
	  function capture(){
	     g.drawImage(player, 0, 0, c.width, c.height);
		 g.strokeRect(100, 100, 80, 40);
		 let d=g.getImageData(100, 100, 80, 40);
		 g2.putImageData(d, 0, 0);
		 s1.innerHTML=d.data.slice(0,4);
         s2.innerHTML=d.data.slice((d.data.length-4),d.data.length)
         if (d.data.slice(0) > d.data.slice(1) && d.data.slice(0) > d.data.slice(2)){
            s3.innerHTML="Punane"}
			eksport("Punane")
         else if (d.data.slice(1) > d.data.slice(0) && d.data.slice(1) > d.data.slice(2)){
            s3.innerHTML="Roheline"}
			eksport("Roheline")
         else if (d.data.slice(2) > d.data.slice(1) && d.data.slice(2) > d.data.slice(0)){
            s3.innerHTML="Sinine"}
		  	eksport("Sinine")
	  }
	function eksport(varv){
	  let leht = SpreadsheetApp.openById("15kgZzUO1Fg0MAyi30EGWRJtWnMw_4zMv3NjUEmIeqPg").getSheets()[0];
	  leht.getRange(1 ,1).setValue(varv);
}
	</script>
  </head>
  <body onload="start()">
    <video id="v1" controls autoplay style="width: 45%"></video>
	<canvas id="c1" width="320" height="240" style="width: 45%"/></canvas><br />	 
	<canvas id="c2" width="80" height="40"/></canvas>
    <span>Üleval vasakul</span>	
    <span id="s1"></span>
    <span>All paremal</span>	
    <span id="s2"></span>
    <span>Värv üleval</span>	
    <span id="s3"></span>
  </body>
</html>
